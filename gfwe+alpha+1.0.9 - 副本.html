<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>绿色森林</title>
    <style>
        body, #game-container { margin: 0; overflow: hidden; touch-action: manipulation; -webkit-user-select: none; user-select: none; background-color: #8FBC8F; }
        .recipe-page { display: none; }
        .recipe-page.active { display: block; }
        .pagination-controls { display: flex; justify-content: space-between; margin-top: 20px; }
        #crafting-page { font-size: 1rem; color: #FF8C00; margin-left: 10px; }
        .flex-center { display: flex; justify-content: center; align-items: center; }
        #start-screen { position: fixed; width: 100vw; height: 100vh; background-color: #8FBC8F; flex-direction: column; z-index: 100; }
        #start-screen h1 { font-size: 3rem; color: #fff; margin-bottom: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        #copyright { position: absolute; bottom: 10px; left: 10px; color: #fff; font-size: 0.8rem; }
        #control-buttons { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
        #touch-crafting, #refresh-button, #inventory-btn { position: fixed; padding: 1rem; font-size: 1.5rem; background-color: rgba(255, 140, 0, 0.9); color: #fff; border: none; border-radius: 50%; width: 60px; height: 60px; z-index: 100; box-shadow: 0 4px 8px rgba(0,0,0,0.3); display: none; justify-content: center; align-items: center; }
        #touch-crafting { bottom: 20px; left: 20px; }
        #refresh-button { bottom: 20px; right: 100px; }
        #inventory-btn { bottom: 20px; right: 20px; }
        .btn { padding: 0.5rem 0.5rem; font-size: 1.5rem; background-color: #FF8C00; color: #fff; border: none; border-radius: 1rem; cursor: pointer; min-width: 200px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .game-element { position: absolute; z-index: 1; }
        .player { width: 50px; height: 50px; background-color: #FF8C00; z-index: 10; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); transition: transform 0.3s ease-out, left 0.2s ease-out, top 0.2s ease-out; }
        .player.moving { animation: playerMove 0.8s infinite alternate ease-in-out; transform-origin: center; }
        .animal { width: 40px; height: 40px; background: pink; border-radius: 50%; position: absolute; z-index: 8; box-shadow: 0 0 10px #ffb6c1; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: #fff; font-weight: bold; }
        @keyframes playerMove { 0% { transform: scale(1) translateY(0); } 50% { transform: scale(0.95) translateY(-3px); } 100% { transform: scale(1) translateY(0); } }
        .tree-leaf { width: 50px; height: 50px; background-color: #008000; border-radius: 50%; z-index: 2; }
        .tree-trunk { width: 20px; height: 70px; background-color: #A0522D; bottom: 0; }
        .stone { width: 50px; height: 50px; background-color: #808080; border-radius: 50%; z-index: 3; }
        .structure { width: 50px; height: 50px; background-color: #A0522D; z-index: 4; }
        .crafting-table { width: 60px; height: 60px; background-color: #654321; z-index: 4; border-radius: 5px; color: white; font-size: 10px; }
        .portal { width: 80px; height: 80px; background: linear-gradient(45deg, #4B0082, #9400D3, #4B0082); border-radius: 50%; z-index: 5; animation: portalPulse 2s infinite; color: white; font-weight: bold; text-shadow: 0 0 5px black; }
        @keyframes portalPulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
        .breaking { animation: breakAnimation 0.5s infinite alternate; }
        @keyframes breakAnimation { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0.7; transform: scale(0.95); } }
        .broken { animation: breakFinish 0.5s forwards; }
        @keyframes breakFinish { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0); } }
        .progress-bar { position: absolute; bottom: -10px; left: 0; width: 100%; height: 5px; background-color: rgba(0,0,0,0.2); z-index: 11; }
        .progress-fill { height: 100%; background-color: #FF8C00; width: 0%; transition: width 0.1s linear; }
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(0, 0, 0, 0.9); color: #fff; padding: 20px; border-radius: 15px; max-width: 90%; z-index: 101; box-shadow: 0 0 20px rgba(0,0,0,0.7); display: none; }
        .popup h2 { text-align: center; margin-bottom: 15px; color: #FF8C00; }
        #touch-controls { position: fixed; bottom: 20px; left: 0; right: 0; display: none; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 102; gap: 10px; }
        #touch-joystick-area { position: fixed; bottom: 90px; left: 20px; width: 120px; height: 120px; touch-action: none; user-select: none; z-index: 109; }
        #touch-joystick { position: absolute; width: 70px; height: 70px; background-color: rgba(255, 140, 0, 0.3); border-radius: 50%; left: 25px; top: 25px; }
        #touch-joystick-thumb { position: absolute; width: 35px; height: 35px; background-color: rgba(255, 140, 0, 0.9); border-radius: 50%; left: 42.5px; top: 42.5px; transition: transform 0.1s; }
        #inventory { position: fixed; bottom: 0; left: 0; right: 0; background-color: rgba(0, 0, 0, 0.7); color: white; padding: 12px; font-size: 1.1rem; z-index: 99; display: flex; justify-content: space-around; flex-wrap: wrap; }
        #inventory span { margin: 0 10px; color: #FF8C00; font-weight: bold; }
        #inventory-panel { position: fixed; bottom: 0; left: 0; right: 0; background-color: rgba(0, 0, 0, 0.9); color: white; padding: 20px; z-index: 98; display: none; flex-direction: column; max-height: 60vh; overflow-y: auto; }
        #inventory-panel h2 { text-align: center; margin-bottom: 15px; color: #FF8C00; }
        #help-button { position: fixed; top: 20px; right: 20px; z-index: 110; padding: 1.8rem; font-size: 1.8rem; background-color: rgba(255, 140, 0, 0.9); color: #fff; border: none; border-radius: 50%; min-width: 80px; min-height: 80px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); touch-action: manipulation; }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .inventory-item { display: flex; flex-direction: column; align-items: center; padding: 10px; background-color: rgba(255, 255, 255, 0.1); border-radius: 8px; }
        .inventory-icon { width: 40px; height: 40px; border-radius: 50%; margin-bottom: 5px; display: flex; justify-content: center; align-items: center; font-size: 12px; }
        .recipe { display: flex; align-items: center; margin-bottom: 15px; padding: 10px; background-color: rgba(255, 255, 255, 0.1); border-radius: 8px; }
        .recipe-items { flex: 1; display: flex; flex-wrap: wrap; gap: 5px; }
        .recipe-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; }
        .recipe-icon { width: 30px; height: 30px; border-radius: 50%; margin-bottom: 3px; font-size: 10px; }
        .recipe-requirement { font-size: 10px; color: #FF8C00; margin-top: 5px; }
        .disabled { opacity: 0.5; pointer-events: auto; }
    </style>
</head>
<body>
    <div id="start-screen" class="flex-center">
        <h1>绿色森林</h1>
        <div id="control-buttons">
            <button id="keyboard-control" class="btn">键盘控制</button>
            <button id="button-control" class="btn">按钮控制</button>
        </div>
        <div id="copyright">COPYRIGHT @WORLDHANS</div>
    </div>
    <div id="game-container">
        <div id="player" class="player game-element"></div>
    </div>
    <div id="player-health-bar" style="position:fixed;top:10px;left:50%;transform:translateX(-50%);width:300px;height:24px;background:rgba(0,0,0,0.3);border-radius:12px;z-index:200;">
        <div id="player-health-fill" style="height:100%;width:100%;background:linear-gradient(90deg,#ff4444,#ffbb44);border-radius:12px;transition:width 0.2s;"></div>
        <span id="player-health-text" style="position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:1.1rem;pointer-events:none;">20 / 20</span>
    </div>
    <div id="inventory-panel">
        <h2>背包</h2>
        <div id="inventory-fuel" style="color:#FF8C00;text-align:center;margin-bottom:10px;font-size:1.1rem;">燃料值：<span id="inventory-fuel-value">0</span></div>
        <div class="inventory-grid" id="inventory-grid"></div>
    </div>
    <div id="touch-controls">
        <div id="touch-joystick-area">
            <div id="touch-joystick"></div>
            <div id="touch-joystick-thumb"></div>
        </div>
    </div>
    <button id="inventory-btn" class="touch-btn">📦</button>
    <button id="touch-crafting" class="touch-btn">🔨</button>
    <button id="refresh-button" class="touch-btn">🔄</button>
    <button id="reclaim-table-btn" class="btn" style="bottom: 100px; right: 20px; position: fixed; z-index: 101; display: none;">收回工作台</button>
    <div id="crafting-ui" class="popup">
        <h2>合成界面 <span id="crafting-page">1/4</span></h2>
        <div id="recipe-pages">
            <div class="recipe-page" style="display: block;">
                <div class="recipe">
                    <div class="recipe-items">
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #808080;">石子</div><span>×1</span></div>
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #A0522D;">木棍</div><span>×1</span></div>
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #8FBC8F;">破碎藤蔓</div><span>×1</span></div>
                    </div>
                    <div class="recipe-item">
                        <div class="recipe-icon" style="background-color: #D2691E;">碎石斧</div>
                        <button id="craft-axe" class="btn">制作</button>
                        <div class="recipe-requirement">无需工作台</div>
                    </div>
                </div>
                <div class="recipe">
                    <div class="recipe-items">
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #A0522D;">木材</div><span>×1</span></div>
                    </div>
                    <div class="recipe-item">
                        <div class="recipe-icon" style="background-color: #654321;">合成台</div>
                        <button id="craft-table" class="btn">制作</button>
                        <div class="recipe-requirement">无需工作台</div>
                    </div>
                </div>
                <div class="recipe">
                    <div class="recipe-items">
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #A0522D;">木材</div><span>×1</span></div>
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #2E8B57;">完整藤蔓</div><span>×1</span></div>
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #8B5A2B;">树枝</div><span>×1</span></div>
                    </div>
                    <div class="recipe-item">
                        <div class="recipe-icon" style="background-color: #D2691E;">木镐</div>
                        <button id="craft-pickaxe" class="btn">制作</button>
                        <div class="recipe-requirement">需要工作台</div>
                    </div>
                </div>
            </div>
            <div class="recipe-page" style="display: none;">
                <div class="recipe">
                    <div class="recipe-items">
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #A0522D;">木材</div><span>×1</span></div>
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #2E8B57;">完整藤蔓</div><span>×1</span></div>
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #8B5A2B;">树枝</div><span>×1</span></div>
                    </div>
                    <div class="recipe-item">
                        <div class="recipe-icon" style="background-color: #FF8C00;">木剑</div>
                        <button id="craft-wooden-sword" class="btn">制作</button>
                        <div class="recipe-requirement">需要工作台</div>
                    </div>
                </div>
                <div class="recipe">
                    <div class="recipe-items">
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #808080;">石子</div><span>×10</span></div>
                    </div>
                    <div class="recipe-item">
                        <div class="recipe-icon" style="background-color: #555555;">熔炉</div>
                        <button id="craft-furnace" class="btn">制作</button>
                        <div class="recipe-requirement">需要合成台</div>
                    </div>
                </div>
            </div>
            <div class="recipe-page" style="display: none;">
                <div class="recipe">
                    <div class="recipe-items">
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #2E8B57;">完整藤蔓</div><span>×1</span></div>
                    </div>
                    <div class="recipe-item">
                        <div class="recipe-icon" style="background-color: #8FBC8F;">破碎藤蔓</div>
                        <span>×3</span>
                        <button id="craft-vine" class="btn">制作</button>
                        <div class="recipe-requirement">无需工作台</div>
                    </div>
                </div>
                <div class="recipe">
                    <div class="recipe-items">
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #8B5A2B;">树枝</div><span>×1</span></div>
                    </div>
                    <div class="recipe-item">
                        <div class="recipe-icon" style="background-color: #A0522D;">木棍</div>
                        <span>×3</span>
                        <button id="craft-branch" class="btn">制作</button>
                        <div class="recipe-requirement">无需工作台</div>
                    </div>
                </div>
            </div>
            <div class="recipe-page" style="display: none;">
                <div class="recipe">
                    <div class="recipe-items">
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #e06666;">生肉</div><span>×1</span></div>
                        <div class="recipe-item"><div class="recipe-icon" style="background-color: #A0522D;">燃料</div><span id="furnace-fuel-value">0</span></div>
                    </div>
                    <div class="recipe-item">
                        <div class="recipe-icon" style="background-color: #b8860b;">熟肉</div>
                        <button id="smelt-cooked-meat" class="btn">熔炼</button>
                        <button id="add-fuel-btn" class="btn" style="margin-top:5px;">添加燃料</button>
                        <div class="recipe-requirement">需要靠近熔炉<br>
                            木棍20燃料，树枝60燃料，木材200燃料
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="pagination-controls">
            <button id="prev-page" class="btn">上一页</button>
            <button id="next-page" class="btn">下一页</button>
        </div>
    </div>
    <div id="message-popup" class="popup">
        <p id="message-content"></p>
        <button id="close-message" class="btn">确定</button>
    </div>
    <!-- 新增燃料选择弹窗 -->
    <div id="fuel-popup" class="popup">
        <h2>添加燃料</h2>
        <div id="fuel-options"></div>
        <button id="close-fuel-popup" class="btn" style="margin-top:10px;">关闭</button>
    </div>
    <script>
    // ===================== 资源定义 =====================
    const RESOURCES = [
        { name: '破碎藤蔓', key: 'vine', color: '#8FBC8F' },
        { name: '木棍', key: 'branch', color: '#A0522D' },
        { name: '完整藤蔓', key: 'fullVine', color: '#2E8B57' },
        { name: '石子', key: 'stone', color: '#808080' },
        { name: '木材', key: 'wood', color: '#A0522D' },
        { name: '碎石斧', key: 'axe', color: '#D2691E', durability: 'axeDurability', max: 10 },
        { name: '木镐', key: 'pickaxe', color: '#654321', durability: 'pickaxeDurability', max: 30 },
        { name: '树枝', key: 'twig', color: '#8B5A2B' },
        { name: '木剑', key: 'woodenSword', color: '#FF8C00', durability: 'woodenSwordDurability', max: 30 },
        { name: '合成台', key: 'craftingTable', color: '#654321' },
        { name: '生肉', key: 'rawMeat', color: '#e06666' },
        { name: '熔炉', key: 'furnace', color: '#555555' },
        { name: '熟肉', key: 'cookedMeat', color: '#b8860b' }
    ];
    // ===================== 游戏状态 =====================
    const game = {
        resources: Object.fromEntries(RESOURCES.map(r => [r.key, 0])),
        axeDurability: 0, pickaxeDurability: 0, woodenSwordDurability: 0,
        player: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
        controlMode: 'keyboard', keyboardInterval: null, keyboardDirection: null,
        isRunning: false, isMoving: false, nearCraftingTable: false, portalSpawned: false,
        touchInterval: null, currentDirection: null, breakingElements: new Map(),
        maxTrees: 3, maxStones: 5, currentTrees: 0, currentStones: 0, inventoryOpen: false,
        health: 20, joystick: { active: false, startX: 0, startY: 0, currentX: 0, currentY: 0 },
        craftingPage: 1, refreshCooldown: false, animals: [], attack: 1,
        furnaceFuel: 0 // 全局熔炉燃料
    };
    // ===================== 元素引用 =====================
    const elements = {
        startScreen: document.getElementById('start-screen'),
        gameContainer: document.getElementById('game-container'),
        player: document.getElementById('player'),
        inventoryBtn: document.getElementById('inventory-btn'),
        inventoryPanel: document.getElementById('inventory-panel'),
        inventoryGrid: document.getElementById('inventory-grid'),
        popups: {
            crafting: document.getElementById('crafting-ui'),
            message: document.getElementById('message-popup')
        },
        buttons: {
            keyboard: document.getElementById('keyboard-control'),
            touch: document.getElementById('button-control'),
            craftAxe: document.getElementById('craft-axe'),
            craftTable: document.getElementById('craft-table'),
            craftPickaxe: document.getElementById('craft-pickaxe'),
            touchControls: document.getElementById('touch-controls'),
            touchCrafting: document.getElementById('touch-crafting'),
            closeMessage: document.getElementById('close-message')
        }
    };
    // ===================== 合成分页 =====================
    const craftingPagination = {
        totalPages: 4, // 改为4页
        nextPage() { if (game.craftingPage < this.totalPages) { game.craftingPage++; this.updatePageDisplay(); } },
        prevPage() { if (game.craftingPage > 1) { game.craftingPage--; this.updatePageDisplay(); } },
        updatePageDisplay() {
            document.getElementById('crafting-page').textContent = `${game.craftingPage}/${this.totalPages}`;
            document.querySelectorAll('.recipe-page').forEach((page, idx) => {
                page.style.display = (idx === game.craftingPage - 1) ? 'block' : 'none';
            });
        }
    };
    // ===================== 按钮绑定工具 =====================
    function bindBtn(id, fn) {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, { passive: false });
        el.addEventListener('click', fn);
    }
    // ===================== 游戏主功能 =====================
    const gameFunctions = {
        init() {
            this.createWorld();
            this.setupEventListeners();
            this.setupJoystick();
            this.updateInventory();
            this.updateHealthBar();
            this.startAnimalMovement();
        },
        checkNearFurnace() {
            const furnaces = document.querySelectorAll('.furnace');
            let near = false;
            furnaces.forEach(furnace => {
                const a = furnace.getBoundingClientRect(), b = elements.player.getBoundingClientRect();
                const d = Math.sqrt(Math.pow(a.left + a.width / 2 - (b.left + b.width / 2), 2) + Math.pow(a.top + a.height / 2 - (b.top + b.height / 2), 2));
                if (d < 100) near = true;
            });
            return near;
        },
        smeltCookedMeat() {
            // 判断是否靠近熔炉
            if (
                game.resources.rawMeat >= 1 &&
                this.checkNearFurnace() &&
                game.furnaceFuel >= 100
            ) {
                game.resources.rawMeat--;
                game.furnaceFuel -= 100;
                game.resources.cookedMeat = (game.resources.cookedMeat || 0) + 1;
                gameFunctions.updateInventory();
                updateFurnaceFuelUI();
                gameFunctions.showMessage("熔炼成功，获得1个熟肉！");
                if (typeof gameFunctions.updateCraftingButtons === 'function') gameFunctions.updateCraftingButtons();
            } else if (game.resources.rawMeat < 1) {
                gameFunctions.showMessage("没有生肉可熔炼！");
            } else if (!this.checkNearFurnace()) {
                gameFunctions.showMessage("需要靠近熔炉才能熔炼！");
            } else if (game.furnaceFuel < 100) {
                gameFunctions.showMessage("燃料不足！需要至少100燃料");
            }
        },
        getAvailableFuel() {
            // 计算背包内木棍、树枝、木材的总燃料值
            return (game.resources.branch * 20) + (game.resources.twig * 60) + (game.resources.wood * 200);
        },
        updateAttack() {
            game.attack = 1 + (game.resources.woodenSword > 0 ? 1 : 0);
        },
        createWorld() {
            while (game.currentTrees < game.maxTrees) { this.createTree(); game.currentTrees++; }
            while (game.currentStones < game.maxStones) { this.createElement('stone'); game.currentStones++; }
            for (let i = 0; i < 3; i++) this.createElement('tree-leaf');
            for (let i = 0; i < 2; i++) this.createAnimal();
        },
        createAnimal() {
            const x = Math.random() * (window.innerWidth - 40);
            const y = Math.random() * (window.innerHeight - 40);
            const el = document.createElement('div');
            el.className = 'animal';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.textContent = '4';
            elements.gameContainer.appendChild(el);
            const animalObj = { el, x, y, hp: 4 };
            game.animals.push(animalObj);
            el.addEventListener('click', () => {
                const playerRect = elements.player.getBoundingClientRect();
                const animalRect = el.getBoundingClientRect();
                const dx = (playerRect.left + playerRect.width / 2) - (animalRect.left + animalRect.width / 2);
                const dy = (playerRect.top + playerRect.height / 2) - (animalRect.top + animalRect.height / 2);
                if (Math.sqrt(dx * dx + dy * dy) > 80) return;
                animalObj.hp -= game.attack;
                if (animalObj.hp <= 0) {
                    el.remove();
                    game.animals = game.animals.filter(a => a !== animalObj);
                    game.resources.rawMeat = (game.resources.rawMeat || 0) + 1;
                    gameFunctions.updateInventory();
                } else {
                    el.textContent = animalObj.hp;
                }
                if (game.resources.woodenSword > 0) {
                    game.woodenSwordDurability--;
                    if (game.woodenSwordDurability <= 0) {
                        game.resources.woodenSword--;

        checkCollision(element) {

                const d = Math.sqrt(Math.pow(a.left + a.width/2 - (b.left + b.width/2), 2) + Math.pow(a.top + a.height/2 - (b.top + b.height/2), 2));
                if (d > 80) this.resetBreakingProgress(el);

        checkNearCraftingTable() {

                const d = Math.sqrt(Math.pow(a.left + a.width/2 - (b.left + b.width/2), 2) + Math.pow(a.top + a.height/2 - (b.top + b.height/2), 2));
                if (d < 100) near = true;

        startBreaking(element, resourceType, isTree = false) {
            if (game.breakingElements.has(element)) return;
            const breakTime = isTree ? 5000 : 500;
            let progress = 0;

            game.breakingElements.set(element, {
                progress: 0,
                interval: setInterval(() => {
                    progress += 100;
                    const percent = Math.min(100, (progress / breakTime) * 100);
                    game.breakingElements.get(element).progress = percent;
                    if (progressBar) progressBar.style.width = `${percent}%`;
                    if (progress >= breakTime) this.finishBreaking(element, resourceType, isTree);
                }, 100),
                isTree
            });
            element.classList.add('breaking');
        },
        resetBreakingProgress(element) {
            if (game.breakingElements.has(element)) {
                const d = game.breakingElements.get(element);
                clearInterval(d.interval);

                if (bar) bar.style.width = '0%';
                game.breakingElements.delete(element);
            }
        },
        finishBreaking(element, resourceType, isTree) {

        setupJoystick() {
            const area = document.getElementById('touch-joystick-area');
            const thumb = document.getElementById('touch-joystick-thumb');
            area.ontouchstart = area.ontouchmove = area.ontouchend = null;
            area.addEventListener('touchstart', e => {
                if (game.controlMode !== 'button') return;
                e.preventDefault();
                const t = e.touches[0], rect = area.getBoundingClientRect();
                const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
                game.joystick.active = true; game.joystick.startX = cx; game.joystick.startY = cy;
                game.joystick.currentX = t.clientX; game.joystick.currentY = t.clientY;
                this.updateJoystickPosition();
            }, { passive: false });
            area.addEventListener('touchmove', e => {
                if (!game.joystick.active) return;
                e.preventDefault();
                const t = e.touches[0];
                game.joystick.currentX = t.clientX; game.joystick.currentY = t.clientY;
                this.updateJoystickPosition(); this.updatePlayerMovement();
            }, { passive: false });
            area.addEventListener('touchend', e => {
                if (!game.joystick.active) return;
                e.preventDefault();
                game.joystick.active = false; thumb.style.transform = 'translate(0, 0)';
                this.stopContinuousMove();
            }, { passive: false });
            area.addEventListener('mousedown', e => {
                if (game.controlMode !== 'button') return;
                const rect = area.getBoundingClientRect();
                const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
                game.joystick.active = true; game.joystick.startX = cx; game.joystick.startY = cy;
                game.joystick.currentX = e.clientX; game.joystick.currentY = e.clientY;
                this.updateJoystickPosition();
            });
            document.addEventListener('mousemove', e => {
                if (!game.joystick.active) return;
                game.joystick.currentX = e.clientX; game.joystick.currentY = e.clientY;
                this.updateJoystickPosition(); this.updatePlayerMovement();
            });
            document.addEventListener('mouseup', () => {
                if (!game.joystick.active) return;
                game.joystick.active = false; thumb.style.transform = 'translate(0, 0)';
                this.stopContinuousMove();
            });
        },
        updateJoystickPosition() {
            const thumb = document.getElementById('touch-joystick-thumb');
            const joystick = document.getElementById('touch-joystick');
            const rect = joystick.getBoundingClientRect();
            const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
            const dx = game.joystick.currentX - game.joystick.startX;
            const dy = game.joystick.currentY - game.joystick.startY;
            const dist = Math.sqrt(dx * dx + dy * dy), maxDist = 35;
            if (dist > maxDist) {
                const angle = Math.atan2(dy, dx);
                thumb.style.transform = `translate(${Math.cos(angle) * maxDist}px, ${Math.sin(angle) * maxDist}px)`;
            } else {
                thumb.style.transform = `translate(${dx}px, ${dy}px)`;
            }
        },
        updatePlayerMovement() {
            if (!game.joystick.active) return;
            const dx = game.joystick.currentX - game.joystick.startX;
            const dy = game.joystick.currentY - game.joystick.startY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 10) { this.stopContinuousMove(); return; }
            const angle = Math.atan2(dy, dx);
            let dir = '';
            if (angle > -Math.PI/4 && angle < Math.PI/4) dir = 'right';
            else if (angle >= Math.PI/4 && angle < 3*Math.PI/4) dir = 'down';
            else if (angle >= -3*Math.PI/4 && angle <= -Math.PI/4) dir = 'up';
            else dir = 'left';
            this.startContinuousMove(dir);
        },
        gameLoop() {
            if (!game.isRunning) return;
            this.checkRefreshButtonPosition();
            document.querySelectorAll('.tree-leaf:not(.broken):not(.breaking)').forEach(leaf => this.collectLeaf(leaf));
            document.querySelectorAll('.stone:not(.broken):not(.breaking)').forEach(stone => this.collectStone(stone));
            document.querySelectorAll('.tree-trunk:not(.broken):not(.breaking)').forEach(trunk => {
                const leaf = trunk.previousElementSibling;
                this.chopTree(trunk, leaf?.classList.contains('tree-leaf') ? leaf : null);
            });
            // 新增：主循环更新按钮
            this.updateReclaimTableBtn();
            this.updateReclaimFurnaceBtn();
            requestAnimationFrame(() => this.gameLoop());
        },
        setupEventListeners() {

            bindBtn('craft-wooden-sword', () => this.craftWoodenSword());

            bindBtn('craft-table', () => this.craftTable());
            bindBtn('craft-pickaxe', () => this.craftPickaxe());
            bindBtn('craft-vine', () => this.craftVine());
            bindBtn('craft-branch', () => this.craftBranch());
            bindBtn('next-page', () => craftingPagination.nextPage());
            bindBtn('prev-page', () => craftingPagination.prevPage());
            bindBtn('refresh-button', () => { if (game.controlMode === 'button') this.refreshMap(); });
            bindBtn('inventory-btn', () => this.toggleInventory());
            bindBtn('touch-crafting', () => {
                if (game.controlMode === 'button') {
                    game.craftingPage = 1; craftingPagination.updatePageDisplay();
                    this.togglePopup(elements.popups.crafting);
                }
            });
            bindBtn('close-message', () => {
                elements.popups.message.style.display = 'none';
                if (game.controlMode === 'button') this.showButtonControls();
            });
            bindBtn('smelt-cooked-meat', () => gameFunctions.smeltCookedMeat());
            const startGame = mode => {
                elements.startScreen.style.display = 'none';
                document.getElementById('player-health-bar').style.display = 'block';
                game.controlMode = mode;
                if (mode === 'button') {
                    elements.buttons.touchControls.style.display = 'flex';
                    elements.inventoryBtn.style.display = 'block';
                    document.getElementById('touch-crafting').style.display = 'flex';
                    document.getElementById('refresh-button').style.display = 'flex';
                } else {
                    elements.buttons.touchControls.style.display = 'none';
                    document.getElementById('touch-joystick-area').style.display = 'block';
                    elements.inventoryBtn.style.display = 'none';
                    document.getElementById('touch-crafting').style.display = 'none';
                    document.getElementById('refresh-button').style.display = 'none';
                }
                game.isRunning = true;
                if (mode === 'button') this.setupJoystick();
                this.gameLoop();
            };
            bindBtn('keyboard-control', () => startGame('keyboard'));
            bindBtn('button-control', () => startGame('button'));
            document.addEventListener('keydown', e => {
                if (game.controlMode !== 'keyboard') return;
                const craftingOpen = elements.popups.crafting.style.display === 'block';
                const inventoryOpen = elements.inventoryPanel.style.display === 'flex';
                const messageOpen = elements.popups.message.style.display === 'block';
                if (messageOpen) { e.preventDefault(); return; }
                if (craftingOpen) { if (e.key.toLowerCase() === 'c') elements.popups.crafting.style.display = 'none'; e.preventDefault(); return; }
                if (inventoryOpen) { if (e.key.toLowerCase() === 'i') { elements.inventoryPanel.style.display = 'none'; game.inventoryOpen = false; } e.preventDefault(); return; }
                if (e.key.toLowerCase() === 'f') {
                    let found = false;
                    document.querySelectorAll('.crafting-table').forEach(table => {
                        const a = table.getBoundingClientRect(), b = elements.player.getBoundingClientRect();
                        const d = Math.sqrt(Math.pow(a.left + a.width/2 - (b.left + b.width/2), 2) + Math.pow(a.top + a.height/2 - (b.top + b.height/2), 2));
                        if (d < 100 && !found) {
                            table.remove();
                            game.resources.craftingTable = (game.resources.craftingTable || 0) + 1;
                            gameFunctions.updateInventory();
                            found = true;
                        }
                    });
                    return;
                }
                let dir = null;
                switch (e.key.toLowerCase()) {
                    case 'c': this.togglePopup(elements.popups.crafting); return;
                    case 'i': this.toggleInventory(); return;
                    case 'w': dir = 'up'; break;
                    case 's': dir = 'down'; break;
                    case 'a': dir = 'left'; break;
                    case 'd': dir = 'right'; break;
                    case 'r':
                        const playerRect = elements.player.getBoundingClientRect();
                        if (playerRect.left < 100 && (window.innerHeight - playerRect.bottom) < 100) this.refreshMap();
                        break;
                }
                if (dir) {
                    if (game.keyboardInterval) clearInterval(game.keyboardInterval);
                    game.keyboardDirection = dir; this.movePlayer(dir);
                    game.keyboardInterval = setInterval(() => this.movePlayer(dir), 50);
                }
            });
            document.addEventListener('keyup', e => {
                if (game.controlMode === 'keyboard' && ['w', 'a', 's', 'd'].includes(e.key.toLowerCase())) {
                    if (game.keyboardInterval) clearInterval(game.keyboardInterval);
                    game.keyboardInterval = null; game.keyboardDirection = null; this.stopMoving();
                }
            });
            window.addEventListener('resize', () => {
                game.player.x = Math.min(window.innerWidth - 50, game.player.x);
                game.player.y = Math.min(window.innerHeight - 50, game.player.y);
                elements.player.style.left = game.player.x + 'px';
                elements.player.style.top = game.player.y + 'px';
            });
        },
        showButtonControls() {
            if (game.controlMode === 'button' && !game.inventoryOpen && elements.popups.message.style.display === 'none') {
                if (elements.popups.crafting.style.display === 'block') {
                    elements.buttons.touchControls.style.display = 'none';
                    document.getElementById('touch-joystick-area').style.display = 'none';
                    elements.inventoryBtn.style.display = 'none';
                    document.getElementById('touch-crafting').style.display = 'flex';
                    this.checkRefreshButtonPosition();
                } else {
                    elements.buttons.touchControls.style.display = 'flex';
                    document.getElementById('touch-joystick-area').style.display = 'block';
                    elements.inventoryBtn.style.display = 'flex';
                    document.getElementById('touch-crafting').style.display = 'flex';
                    this.checkRefreshButtonPosition();
                }
            }
        },

                    const d = Math.sqrt(Math.pow(a.left + a.width / 2 - (b.left + b.width / 2), 2) + Math.sqrt(a.top + a.height / 2 - (b.top + b.height / 2), 2));

        movePlayer(direction) {
            const step = 15, size = 50;
            if (!game.isMoving) { game.isMoving = true; elements.player.classList.add('moving'); }
            let newX = game.player.x, newY = game.player.y;
            if (direction === 'up') newY = Math.max(0, game.player.y - step);
            if (direction === 'down') newY = Math.min(window.innerHeight - size, game.player.y + step);
            if (direction === 'left') newX = Math.max(0, game.player.x - step);
            if (direction === 'right') newX = Math.min(window.innerWidth - size, game.player.x + step);
            game.player.x = newX; game.player.y = newY;
            elements.player.style.left = game.player.x + 'px';
            elements.player.style.top = game.player.y + 'px';
            this.checkNearCraftingTable(); this.checkBreakingDistance();
            // 新增：移动后更新按钮
            this.updateReclaimTableBtn();
            this.updateReclaimFurnaceBtn();
        },

        gameLoop() {
            if (!game.isRunning) return;
            this.checkRefreshButtonPosition();
            document.querySelectorAll('.tree-leaf:not(.broken):not(.breaking)').forEach(leaf => this.collectLeaf(leaf));
            document.querySelectorAll('.stone:not(.broken):not(.breaking)').forEach(stone => this.collectStone(stone));
            document.querySelectorAll('.tree-trunk:not(.broken):not(.breaking)').forEach(trunk => {
                const leaf = trunk.previousElementSibling;
                this.chopTree(trunk, leaf?.classList.contains('tree-leaf') ? leaf : null);
            });
            // 新增：主循环更新按钮
            this.updateReclaimTableBtn();
            this.updateReclaimFurnaceBtn();
            requestAnimationFrame(() => this.gameLoop());
        },

    // ===================== 添加燃料弹窗逻辑 =====================
    function showFuelPopup() {
        const popup = document.getElementById('fuel-popup');
        const options = document.getElementById('fuel-options');
        options.innerHTML = '';
        // 可燃物品及其燃料值
        const fuels = [
            { key: 'branch', name: '木棍', value: 20, color: '#A0522D' },
            { key: 'twig', name: '树枝', value: 60, color: '#8B5A2B' },
            { key: 'wood', name: '木材', value: 200, color: '#A0522D' }
        ];
        let hasFuel = false;
        fuels.forEach(fuel => {
            if (game.resources[fuel.key] > 0) {
                hasFuel = true;
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.style.margin = '5px';
                btn.innerHTML = `<span style="background:${fuel.color};color:#fff;padding:4px 10px;border-radius:8px;">${fuel.name}</span> ×1 → <span style="color:#FF8C00;">+${fuel.value}燃料</span>`;
                btn.onclick = function () {
                    game.resources[fuel.key]--;
                    game.furnaceFuel += fuel.value;
                    updateFurnaceFuelUI();
                    gameFunctions.updateInventory();
                    showFuelPopup(); // 刷新弹窗
                    if (typeof gameFunctions.updateCraftingButtons === 'function') gameFunctions.updateCraftingButtons();
                };
                options.appendChild(btn);
            }
        });
        if (!hasFuel) {
            options.innerHTML = '<div style="color:#fff;text-align:center;">没有可用燃料物品</div>';
        }
        popup.style.display = 'block';
    }
    document.getElementById('add-fuel-btn').onclick = function () {
        if (!gameFunctions.checkNearFurnace()) {
            gameFunctions.showMessage("需要靠近熔炉才能添加燃料！");
            return;
        }
        showFuelPopup();
    };
    document.getElementById('close-fuel-popup').onclick = function () {
        document.getElementById('fuel-popup').style.display = 'none';
        if (typeof gameFunctions.updateCraftingButtons === 'function') gameFunctions.updateCraftingButtons();
    };
